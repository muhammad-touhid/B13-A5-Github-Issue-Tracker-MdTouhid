<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="geist-font w-full h-screen bg-[#F8FAFC] flex items-center">
    <div
      class="sign-in-container w-[320px] sm:w-[520px] m-auto bg-white p-8 rounded-lg shadow-lg"
    >
      <div class="sign-in-header text-center">
        <img
          class="w-[50px] md:w-[100px] h-[50px] md:h-[100px] m-auto"
          src="./assets/github-logo.png"
          alt=""
        />
        <h2 class="text-xl md:text-2xl font-semibold mt-4">
          GitHub Issues Tracker
        </h2>
        <p class="text-base text-gray-500">Sign in to manage your issues</p>
      </div>
      <fieldset class="fieldset w-full mt-4 md:mt-8">
        <label class="label color-font text-base font-semibold">Username</label>
        <input
          id="input-username"
          type="email"
          class="input w-full"
          placeholder="Enter Username"
        />
        <p class="text-sm text-[#4A00FF]">Default: admin</p>

        <label class="label color-font text-base font-semibold">Password</label>
        <input
          id="input-password"
          type="password"
          class="input w-full"
          placeholder="Enter password"
        />
        <p class="text-sm text-[#4A00FF]">Default: admin123</p>

        <button
          id="login-btn"
          class="btn bg-[#4A00FF] text-white mt-4 font-semibold"
        >
          Sign In
        </button>
      </fieldset>
      <div class="flex items-center gap-2 justify-around my-6">
        <hr class="w-[50%] text-[#E4E4E7]" />
        <span>OR</span>
        <hr class="w-[50%] text-[#E4E4E7]" />
      </div>
      <p class="text-sm text-gray-500 text-center">Demo Credentials:</p>
      <div class="bg-[#F8FAFC] py-6 w-full text-center mt-2">
        <p>
          <span class="color-font font-semibold capitalize">username: </span
          >admin
        </p>
        <p>
          <span class="color-font font-semibold capitalize">password: </span
          >admin123
        </p>
      </div>
    </div>

    <script src="./script/login.js"></script>
  </body>
</html>
